# CustomResourceDefinition for the workshop's ReportRequest resource.
#
# This is the heart of the workshop: it teaches the Kubernetes API server a brand new
# resource type. After applying this, `kubectl get reportrequests` works just like any
# built-in resource — but nothing *acts* on these objects until the controller (step 04)
# is running.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: reportrequests.reports.workshop.io
spec:
  group: reports.workshop.io
  scope: Namespaced
  names:
    kind: ReportRequest
    listKind: ReportRequestList
    plural: reportrequests
    singular: reportrequest
    shortNames:
      - rr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - title
                - dataset
              properties:
                title:
                  type: string
                  description: Human-readable title of the report.
                dataset:
                  type: string
                  description: >-
                    Financial data to analyse. Free-form text: e.g. quarterly
                    revenue figures, a CSV snippet, or a short description.
                instructions:
                  type: string
                  description: Optional extra instructions for the report generator.
                format:
                  type: string
                  description: Output format. Only "pdf" is supported in the workshop.
                  enum:
                    - pdf
                  default: pdf
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Current lifecycle phase of the request.
                  enum:
                    - Pending
                    - Processing
                    - Completed
                    - Failed
                message:
                  type: string
                  description: Human-readable detail about the current phase.
                jobName:
                  type: string
                  description: Name of the Job the controller created to do the work.
                pdfObjectKey:
                  type: string
                  description: Object key of the generated PDF in MinIO (when completed).
                observedGeneration:
                  type: integer
                  description: The spec generation the controller last reconciled.
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Title
          type: string
          jsonPath: .spec.title
        - name: Job
          type: string
          jsonPath: .status.jobName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
