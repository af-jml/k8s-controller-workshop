# A sample ReportRequest. Apply it with:
#   kubectl apply -f 05-reports/sample-reportrequest.yaml
#
# By this step the controller is already running (deployed in step 04), so this request is
# picked up immediately: the controller creates a worker Job that renders a PDF and uploads
# it to the `reports` bucket you provisioned in step 03.
apiVersion: reports.workshop.io/v1alpha1
kind: ReportRequest
metadata:
  name: q2-revenue-analysis
  namespace: workshop
spec:
  title: Q2 Revenue Analysis
  dataset: |
    Revenue: 1.20M
    Cost of goods: 0.55M
    Operating expenses: 0.25M
    Net profit: 0.40M
  instructions: Highlight the largest cost centres and suggest savings.
  format: pdf
