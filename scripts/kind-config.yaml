# kind cluster configuration for the workshop.
# A single control-plane node with host port mappings so the web app
# (served via ingress-nginx) is reachable at http://localhost:8080.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: workshop
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # ingress-nginx HTTP -> localhost:8080
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      # ingress-nginx HTTPS -> localhost:8443
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
