# Sample Bucket resources. Apply with:
#   kubectl apply -f sample-bucket.yaml
#
# Before the controller is running, these just sit there with no status — a CRD is only
# data. Once the controller reconciles them, the real buckets appear in MinIO with the
# requested access policy and quota. Watch them with:
#   kubectl get buckets -n report-queue -w
#   # or in k9s: :buckets
---
apiVersion: storage.workshop.io/v1alpha1
kind: Bucket
metadata:
  name: analytics-exports
  namespace: report-queue
spec:
  bucketName: analytics-exports
  accessPolicy: private
  quota: 100Mi
  # Default is Retain. Set to Delete to have the controller remove the real bucket
  # (and its objects) when this resource is deleted — a finalizer makes that safe.
  deletionPolicy: Delete
---
apiVersion: storage.workshop.io/v1alpha1
kind: Bucket
metadata:
  name: public-assets
  namespace: report-queue
spec:
  bucketName: public-assets
  accessPolicy: public-read
  quota: 1Gi
  deletionPolicy: Retain
